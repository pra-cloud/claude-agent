## File: .github/workflows/daily_news.yml
## Place this file in your GitHub repo at exactly that path.

name: Daily Tech News Bot

on:
  schedule:
    # Runs every day at 8:00 AM IST (2:30 AM UTC)
    # Cron format: minute hour day month weekday
    - cron: "30 2 * * *"

  # Also allows manual trigger from GitHub Actions UI
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run news bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python news_bot.py
